<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Makes the page responsive on phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- The whole calculator box -->
  <div class="calculator">

    <!-- ====== DISPLAY SCREEN ====== -->
    <!-- Shows what the user types and the result -->
    <div class="display" id="display">0</div>

    <!-- ====== BUTTONS GRID ====== -->
    <div class="buttons">

      <!-- Row 1: Clear, Delete, Divide -->
      <!-- data-action tells JavaScript what each button does -->
      <button class="btn function" data-action="clear">C</button>
      <button class="btn function" data-action="delete">⌫</button>
      <button class="btn operator" data-action="/">÷</button>

      <!-- Row 2 -->
      <button class="btn" data-action="7">7</button>
      <button class="btn" data-action="8">8</button>
      <button class="btn" data-action="9">9</button>
      <button class="btn operator" data-action="*">×</button>

      <!-- Row 3 -->
      <button class="btn" data-action="4">4</button>
      <button class="btn" data-action="5">5</button>
      <button class="btn" data-action="6">6</button>
      <button class="btn operator" data-action="-">−</button>

      <!-- Row 4 -->
      <button class="btn" data-action="1">1</button>
      <button class="btn" data-action="2">2</button>
      <button class="btn" data-action="3">3</button>
      <button class="btn operator" data-action="+">+</button>

      <!-- Row 5: the × at the end of row 1 had divide; here 0, dot, equals -->
      <button class="btn zero" data-action="0">0</button>
      <button class="btn" data-action=".">.</button>
      <button class="btn equals" data-action="=">=</button>

    </div>
  </div>

  <!-- Link to our JavaScript (placed at the end so the page loads first) -->
  <script src="script.js"></script>
</body>
</html>
